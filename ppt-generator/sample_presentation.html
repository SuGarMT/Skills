<!DOCTYPE html>
<html lang="zh-CN">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>模板样例展示 — Ultimate Dark</title>
      <script>
            // Generate a truly unique version hash to bust all browser cached CSS
            document.write('<link rel="stylesheet" href="resources/ppt-template/styles.css?v=' + Date.now() + '">');
      </script>
      <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>

<body>
      <div id="app">
            <div class="presentation-container" @click="next">
                  <!-- Global Header -->
                  <div class="global-header">
                        <div class="gh-left">
                              <span class="gh-title">模板演示 PPT</span>
                        </div>
                        <div class="gh-right">
                              <div class="gh-avatar-wrapper">
                                    <img src="resources/ppt-template/pic.jpg" alt="Avatar" class="gh-avatar">
                              </div>
                              <span class="gh-author">MT</span>
                        </div>
                  </div>

                  <transition name="fade" mode="out-in">
                        <component :is="currentSlide.layout" v-bind="currentSlide.props" :key="currentIndex">
                        </component>
                  </transition>

                  <!-- Global Footer -->
                  <div class="global-footer">
                        <div class="page-number-pill">
                              {{ String(currentIndex + 1).padStart(2, '0') }} / {{ String(slides.length).padStart(2,
                              '0') }}
                        </div>
                  </div>
            </div>
      </div>

      <script type="module">
            // Bypass aggressive Chrome module caching using dynamic import with timestamp
            const moduleCacheBuster = Date.now();
            const { layouts } = await import('./resources/ppt-template/layouts.js?v=' + moduleCacheBuster);

            const slides = [
                  { layout: 'coverSlide', props: { icon: 'https://raw.githubusercontent.com/FortAwesome/Font-Awesome/6.x/svgs/solid/robot.svg', series: 'Antigravity', name: '问题汇总', tagline: '网络环境、账号问题、疑难杂症' } },
                  { layout: 'titleSlide', props: { title: '第一章 · 网络环境', subtitle: '基建稳了，网络才不会崩' } },
                  { layout: 'messageSlide', props: { prefix: '3. messageSlide - 核心观点', message: '简约即是终极的复杂。', highlight: true } },
                  { layout: 'questionSlide', props: { question: '4. questionSlide - 提问页' } },
                  { layout: 'splitSlide', props: { badge: '全新特性', title: '5. splitSlide -<br>左右分栏', description: '用 AI 驱动的引擎重塑您的日常运营。', stats: [{ value: '3x', label: '效率跃升' }, { value: '-40%', label: '成本降低' }], cards: { header: '核心能力', items: [{ title: '自动同步', desc: '实时数据引擎' }, { title: '智能路由', desc: '全球 CDN 加速' }, { title: '深度分析', desc: '定制化洞察报告' }] } } },
                  { layout: 'statsSlide', props: { title: '6. statsSlide - 数据统计', subtitle: '年度增长数据', items: [{ value: '250 万+', label: '活跃用户' }, { value: '99.99%', label: '可用性' }, { value: '4 亿', label: '营收 (美元)' }] } },
                  { layout: 'cardGridSlide', props: { title: '7. cardGridSlide - 网格卡片', cards: [{ title: '数据分析', desc: '深度业务洞察' }, { title: '安全合规', desc: '银行级防护' }, { title: '弹性伸缩', desc: '支持亿级高并发' }, { title: '全球支持', desc: '24/7 客户服务' }] } },
                  { layout: 'terminalSlide', props: { title: '8. terminalSlide - 终端代码', lines: [{ text: '$ npm install @enterprise/core', class: 'cmd' }, { text: 'success Saved 42 packages', class: 'success' }] } },
                  { layout: 'comparisonSlide', props: { title: '9. comparisonSlide - 对比', left: { label: '传统架构', items: [{ title: '单体应用', desc: '牵一发而动全身，扩展困难' }] }, right: { label: '现代技术栈', items: [{ title: '微服务架构', desc: '组件独立运行，灵活伸缩' }] } } },
                  { layout: 'flowSlide', props: { title: '10. flowSlide - 流程图', steps: [{ title: '数据接入', desc: '多源数据收集清洗' }, { title: 'AI 处理', desc: '大模型流水线分析' }, { title: '结果输出', desc: '多端协同呈现' }] } },
                  { layout: 'timelineSlide', props: { title: '11. timelineSlide - 时间线', events: [{ date: '2026 Q1', title: 'Alpha 版本发布', desc: '核心功能内部测试' }, { date: '2026 Q2', title: 'Beta 测试', desc: '邀测用户公开体验' }] } },
                  { layout: 'quoteSlide', props: { quote: '12. quoteSlide - 引用/金句', author: 'Alan Kay', role: '计算机科学家' } },
                  { layout: 'imageTextSlide', props: { title: '13. imageTextSlide - 截图与解决方案', description: '系统报错或流程异常时的界面截图展示。', imageUrl: 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=1200&q=80', badge: '问题排查', solution: '检查并修改配置文件中的代理设置，重启服务以使得相关网络请求能够正常放行生效。' } },
                  { layout: 'listSlide', props: { title: '14. listSlide - 要点列表', items: [{ title: '启动全球市场营销活动', desc: '重点突破亚太地区新兴市场' }, { title: '扩大研发团队规模', desc: '吸纳顶尖 AI 与核心架构工程师' }] } },
                  { layout: 'teamSlide', props: { title: '15. teamSlide - 团队/人物卡片', members: [{ name: 'Alex Smith', role: 'CEO', desc: '15 年行业经验', initial: 'A' }, { name: 'Bob Johnson', role: 'CTO', desc: '资深云架构专家', initial: 'B' }] } },
                  { layout: 'gallerySlide', props: { title: '16. gallerySlide - 图片画廊', items: [{ title: '极简白', color: '#f8fafc' }, { title: '暗夜紫', color: '#4c1d95' }, { title: '赛博绿', color: '#10b981' }, { title: '霓虹黄', color: '#fbbf24' }] } },
                  { layout: 'endSlide', props: { message: '17. endSlide - 结束页' } }
            ];

            const app = Vue.createApp({
                  data() {
                        return { slides, currentIndex: 0 };
                  },
                  computed: {
                        currentSlide() { return this.slides[this.currentIndex]; }
                  },
                  methods: {
                        next() {
                              if (this.currentIndex < this.slides.length - 1) this.currentIndex++;
                        },
                        prev() {
                              if (this.currentIndex > 0) this.currentIndex--;
                        }
                  },
                  mounted() {
                        window.addEventListener('keydown', (e) => {
                              if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); this.next(); }
                              if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); this.prev(); }
                        });
                  }
            });

            for (const [name, config] of Object.entries(layouts)) {
                  app.component(name, config);
            }
            app.mount('#app');
      </script>
</body>

</html>
